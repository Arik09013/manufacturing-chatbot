  xai_in_simulation:
    match: [explainability, explainable, explainable ai, xai, shap, lime, attention, explain the prediction, where does shap, interpretability, why did the model, trust the answer, explain the fault from sim, explain over sim data]
    category: integration
    summary: "Explainability is unchanged by the data SOURCE: whether sensor data comes from Isaac Sim or real hardware, it arrives on the same topics, gets fused, classified (RandomForest / DistilBERT), and explained with SHAP (driving channels), LIME (local), and attention (text notes) — the sim just makes it easy to prove the explanation is right because you know the injected ground truth."
    causes: []
    remedies:
      - "Pipeline is data-agnostic: sim sensor topics ──▶ fusion ──▶ detector ──▶ SHAP/LIME/attention ──▶ synthesize.py narration — identical to the CSV pipeline, only the source changed"
      - "SHAP: shows which fused sensor channels drove the fault call (e.g. arc_voltage variance for arc_instability) — the top-driver check"
      - "LIME: a local, model-agnostic second opinion on the same prediction"
      - "Attention: highlights which words in the operator note the DistilBERT detector weighted"
      - "Sim advantage — ground-truth validation: because YOU injected the fault into a known channel, you can verify SHAP points at that exact channel (the 100% SHAP-alignment metric), which you cannot do on unlabeled real data"
      - "Confidence: report the same 0.7·anomaly_prob + 0.3·SHAP-agreement score so the operator sees how trustworthy the call is"
    parameters: []
    notes: "Flow to draw: [Isaac sim sensors] ──▶ fuse ──▶ detector ──▶ SHAP + LIME + attention ──▶ confidence ──▶ LLM narration. The thesis point: simulation turns explainability from a qualitative claim into a measurable one — injected-channel vs SHAP-attributed-channel gives a fidelity number. This is exactly Objective 2 (all three XAI methods) demonstrated with ground truth."

  thesis_contribution_sim:
    match: [novel contribution, novelty, what is new, why simulation, why isaac, why use simulation, why not real data, contribution of, research contribution, limitations, future work, defend, defense, viva, what does it prove, justify the simulation, academic contribution, significance, why this matters]
    category: integration
    summary: "The novel contribution is a hardware-agnostic, no-RAG, explainable welding-reasoning pipeline (multimodal fusion → detection → SHAP/LIME/attention → physics-grounded parameter optimizer → LLM narration that never invents numbers); Isaac Sim adds a controllable, ground-truth source that lets you generate labelled multimodal data, inject known faults, and MEASURE explanation fidelity — things real shop-floor data can't give cheaply or safely."
    causes: []
    remedies:
      - "Why simulation, not just real data: real welding data is scarce, unlabeled, expensive, and hazardous to perturb; the sim gives unlimited labelled multimodal data with KNOWN injected faults, enabling the 100% SHAP-alignment fidelity metric and safe fault scenarios"
      - "What the sim proves that CSVs didn't: an end-to-end robot+sensor+reasoning loop (seam tracking, F/T contact, live telemetry → chatbot) and a clean sim-to-real swap path via the ROS 2 topic contract"
      - "Core contributions to state: (1) trustworthy, hallucination-free welding advice — every number from physics/ML, LLM phrases only; (2) all three XAI methods with a measurable fidelity number; (3) no-RAG deterministic knowledge grounding; (4) modular pipeline that runs on sim OR real hardware unchanged"
      - "Limitations (state them proactively): Isaac doesn't model arc metallurgy (no real weld pool); ROC-AUC ~1.0 is optimistic on cleanly-separable injected faults; no expert/operator validation study yet; CloudXR/Vision Pro teleop is the fragile, least-proven piece"
      - "Future work: real-hardware validation (true digital twin), expert validation of prescriptive setpoints, comprehensibility survey of the XAI, cross-attention transformer fusion, and a coupled thermal/CFD weld-pool model"
    parameters: []
    notes: "Frame it as a positioning chain: real data = scarce/unlabeled/unsafe ──▶ simulation = labelled/controllable/ground-truth ──▶ enables measurable XAI + safe fault injection + sim-to-real path ──▶ contribution = trustworthy explainable welding assistant, demonstrated in sim, ready for hardware. Be honest that the welding metallurgy is NOT simulated and hardware validation is future work — owning the limitations is what makes the contribution defensible. See the gap analysis: Objective 2 (3 XAI methods) and the parameter optimizer are the fully-met core; transformer fusion and live data are the named future work."
