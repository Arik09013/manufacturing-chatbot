# Welding fault root-cause to recommended action mapping
# Format:
#   <anomaly_type>:
#     causes:
#       - <feature_pattern>: <cause_description>
#     actions:
#       primary:   <immediate action>
#       secondary: <follow-up action>
#     urgency: critical | high | medium

arc_instability:
  causes:
    - welding_current_std:  "High current fluctuation — unstable arc condition"
    - arc_voltage_std:      "Voltage oscillation indicating arc instability"
    - heat_input_std:       "Erratic heat input caused by intermittent arc"
  actions:
    primary:   "Stop welding. Inspect and replace contact tip. Check wire for surface contamination or oxidation."
    secondary: "Verify power supply output stability. Check earth clamp connection and cable condition."
  urgency: high

wire_feed_fault:
  causes:
    - wire_feed_rate_mean:  "Wire feed rate dropped below setpoint — interrupted arc"
    - welding_current_mean: "Welding current dropped in line with reduced wire feed"
    - heat_input_mean:      "Reduced heat input from insufficient wire deposition"
  actions:
    primary:   "Stop weld. Clear any wire jam or kink in the liner. Check spool brake tension and drive roll pressure."
    secondary: "Inspect drive motor and replace worn drive rolls. Verify liner is clean and not kinked."
  urgency: high

gas_flow_failure:
  causes:
    - shielding_gas_flow_mean: "Shielding gas flow dropped — weld pool exposed to atmosphere"
    - shielding_gas_flow_min:  "Gas flow reached critically low or zero — porosity risk"
  actions:
    primary:   "Stop welding immediately. Check gas cylinder level and replace if empty. Inspect solenoid valve."
    secondary: "Check all gas hose connections for leaks. Test solenoid valve operation manually."
  urgency: critical

overheating:
  causes:
    - heat_input_mean:       "Heat input exceeded upper control limit — burn-through or distortion risk"
    - welding_speed_mean:    "Travel speed too slow — excessive dwell time"
    - welding_current_mean:  "Welding current above setpoint — contributing to excess heat"
  actions:
    primary:   "Increase travel speed to reduce heat input. Verify speed setpoint and motion controller."
    secondary: "Reduce welding current by 10-15 A. Allow workpiece to cool between passes if multi-pass."
  urgency: critical

underheat:
  causes:
    - heat_input_mean:    "Heat input below lower control limit — incomplete fusion risk"
    - welding_speed_mean: "Travel speed too high — insufficient time for proper fusion"
    - arc_voltage_mean:   "Arc voltage too low for material thickness — shallow penetration"
  actions:
    primary:   "Reduce travel speed to increase heat input. Verify speed controller setpoint."
    secondary: "Increase arc voltage by 1-2 V. Perform weld procedure qualification check on sample piece."
  urgency: high

unknown:
  causes:
    - "Unusual combination of welding parameters detected"
  actions:
    primary:   "Review parameter logs and consult welding procedure specification (WPS)."
    secondary: "Perform visual inspection and NDT check on affected welds. Escalate to welding engineer."
  urgency: medium
