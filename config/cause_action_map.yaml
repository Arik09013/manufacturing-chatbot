# Root-cause to recommended action mapping
# Format:
#   <anomaly_type>:
#     causes:
#       - <pattern>: <cause_description>  (pattern matches feature name substrings)
#     actions:
#       primary:    <immediate action>
#       secondary:  <follow-up action>
#     urgency: critical | high | medium

overheating:
  causes:
    - temperature_mean: "Sustained elevated temperature in process zone"
    - temperature_max: "Temperature spike exceeding safe operating limit"
    - power_consumption_mean: "Elevated power draw causing excess heat generation"
  actions:
    primary: "Immediately reduce machine throughput by 20% and inspect cooling system (fans, coolant lines)"
    secondary: "Schedule maintenance check of heat exchanger and coolant pump within next 4 hours"
  urgency: critical

bearing_failure:
  causes:
    - vibration_mean: "Elevated average vibration indicating bearing wear"
    - vibration_max: "Vibration spike consistent with bearing race damage"
    - rpm_std: "RPM instability caused by mechanical resistance in bearing"
  actions:
    primary: "Reduce machine speed to 70% setpoint and flag bearing for inspection at next scheduled downtime"
    secondary: "Apply emergency lubrication and schedule bearing replacement within 24 hours"
  urgency: high

pressure_loss:
  causes:
    - pressure_mean: "Average hydraulic pressure below minimum operating threshold"
    - pressure_min: "Pressure dropped to critically low level"
    - pressure_std: "Pressure fluctuations indicating intermittent seal leak"
  actions:
    primary: "Inspect hydraulic circuit for seal leaks and check relief valve settings"
    secondary: "If pressure continues to drop, initiate controlled shutdown and replace hydraulic seals"
  urgency: high

motor_overload:
  causes:
    - power_consumption_mean: "Motor drawing excess current, risking thermal damage"
    - power_consumption_max: "Power spike exceeded rated motor capacity"
    - temperature_mean: "Motor overheating due to sustained high load"
  actions:
    primary: "Reduce mechanical load on drive shaft and check for jams or blockages"
    secondary: "Inspect motor windings and thermal protection relay; reset overload and monitor closely"
  urgency: critical

coolant_failure:
  causes:
    - temperature_mean: "Rising process temperature caused by insufficient coolant flow"
    - pressure_mean: "Low coolant pressure indicating pump failure or line obstruction"
    - temperature_std: "Temperature fluctuations consistent with intermittent coolant flow"
  actions:
    primary: "Check coolant reservoir level, pump operation, and coolant line integrity"
    secondary: "If coolant pump is faulty, initiate controlled shutdown to prevent heat damage"
  urgency: critical

# Default fallback for unknown anomaly types
unknown:
  causes:
    - "Unusual combination of sensor readings detected"
  actions:
    primary: "Review sensor readings and recent log events with maintenance supervisor"
    secondary: "Log incident and monitor machine closely for 2 hours"
  urgency: medium
